model:
  hidden_dim: 256
  num_gt_layers: 6
  num_heads: 8
  norm: bn
  gt_aggregators:
  - sum
  - mean
  aggregators:
  - sum
  - mean
  - max
  - std
  dropout: 0.4
  act: gelu
  gate: true
  qkv_bias: false
  num_head_layers: 1
  head_norm: false
  head_residual: false
  head_dropout: null
isoforms:
  enabled: false
  desalting: true
  tautomers: true
  max_tautomers: 10
  protonation: true
  max_protomers: 10
  ph_range:
  - 6.4
  - 8.4
  neutralization: true
  rdkit_fallback: false
descriptors:
  include_2d_targets: true
  include_3d_targets: true
  loss_weight: 1.0
  three_d_settings:
    rdkit_include_getaway: false
    target_mode: lowest_energy
conformers:
  n_generate: 8
  n_keep_best: 3
  max_delta_energy_kcal: 3.0
ecfp_latent_alignment:
  enabled: true
  weight: 0.05
  fp_bits: 2048
  fp_radius: 2
  num_pairs: 128
  temperature: 0.1
  tie_epsilon: 0.02
  log_rank_metrics: true
masking_ratio: 0.15
batch_size: 128
max_epochs: 1500
patience: 50
lr: 0.0003
weight_decay: 1.0e-05
warmup_epochs: 25
num_workers: 0
device: cpu
subsample: null
winsorize_range:
- -6.0
- 6.0
split_ratios:
- 0.7
- 0.2
- 0.1
seed: 123
