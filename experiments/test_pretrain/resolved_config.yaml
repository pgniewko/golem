model:
  hidden_dim: 128
  num_gt_layers: 4
  num_heads: 8
  norm: bn
  gt_aggregators:
  - sum
  - mean
  aggregators:
  - sum
  - mean
  - max
  - std
  dropout: 0.3
  act: gelu
  gate: true
  qkv_bias: false
isoforms:
  enabled: false
  max_isoforms: 25
  tautomers: true
  max_tautomers: 25
  protonation: true
  ph_range: !!python/tuple
  - 6.4
  - 8.4
  neutralization: true
masking_ratio: 0.15
batch_size: 128
max_epochs: 10
patience: 50
lr: 0.0001
weight_decay: 1.0e-05
warmup_epochs: 25
num_workers: 4
winsorize_range: !!python/tuple
- -6.0
- 6.0
split_ratios:
- 0.7
- 0.2
- 0.1
seed: 42
