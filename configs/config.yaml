# Example overrides for golem.config.PretrainConfig.
# Current default setup: 2D descriptors only, isoforms disabled, no ECFP-latent alignment.

model:
  dropout: 0.2
  head_dropout: 0.2

pretrain:
  max_epochs: 5000
  patience: 100
  lr: 3.0e-4

isoforms:
  enabled: false

descriptors:
  include_2d_targets: true
  include_3d_targets: false
  loss_weight: 1.0
  # Setting either family weight switches to family-level mean MSE; an included
  # family left as null then uses effective weight 1.0, not 0.0.
  two_d_loss_weight: null
  three_d_loss_weight: null

ecfp_latent_alignment:
  enabled: false
