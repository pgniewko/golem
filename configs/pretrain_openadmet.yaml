model:
  hidden_dim: 128
  num_gt_layers: 4
  num_heads: 8
  norm: "bn"
  gt_aggregators: ["sum", "mean"]
  aggregators: ["sum", "mean", "max", "std"]
  dropout: 0.2
  act: "gelu"
  gate: true
  num_head_layers: 2
  head_norm: true
  head_residual: true
  head_dropout: 0.4

pretrain:
  masking_ratio: 0.15
  batch_size: 128
  max_epochs: 5000
  patience: 100
  lr: 1.0e-4
  weight_decay: 1.0e-5
  warmup_epochs: 25
  num_workers: 4
  winsorize_range: [-6.0, 6.0]
  split_ratios: [0.7, 0.2, 0.1]
  seed: 42  # pretrain seed (finetune notebooks use 1928374650)

isoforms:
  enabled: true
  desalting: { enabled: true }
  tautomers: { enabled: true, max_tautomers: 10 }
  protonation: { enabled: true, ph_range: [6.4, 8.4], max_protomers: 10 }
  neutralization: { enabled: true }
  deduplication: true
