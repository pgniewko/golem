model:
  hidden_dim: 128
  num_gt_layers: 4
  num_heads: 8
  norm: "bn"
  gt_aggregators: ["sum", "mean"]
  aggregators: ["sum", "mean", "max", "std"]
  dropout: 0.2
  act: "gelu"
  gate: true
  num_head_layers: 1
  head_norm: false
  head_residual: false
  head_dropout: 0.2

pretrain:
  masking_ratio: 0.15
  batch_size: 128
  max_epochs: 5000
  patience: 100
  lr: 3.0e-4
  weight_decay: 1.0e-5
  warmup_epochs: 25
  num_workers: 4
  winsorize_range: [-6.0, 6.0]
  split_ratios: [0.7, 0.2, 0.1]
  seed: 42

isoforms:
  enabled: true
  desalting: { enabled: true }
  tautomers: { enabled: true, max_tautomers: 10 }
  protonation: { enabled: true, ph_range: [6.4, 8.4], max_protomers: 10 }
  neutralization: { enabled: true }
  deduplication: true

ecfp_latent_alignment:
  enabled: false
  weight: 0.01
  fp_bits: 2048
  fp_radius: 2
  num_pairs: 128
  temperature: 0.1
  tie_epsilon: 0.02
  warmup_epochs: 5
  log_rank_metrics: true
